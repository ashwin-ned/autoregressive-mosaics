<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neuro-Symbolic Mosaics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'JetBrains Mono', monospace; background-color: #050505; color: #22c55e; }
        
        /* Grid and Animation */
        .grid-cell { transition: background-color 0.1s ease-out; border: 1px solid #14532d; }
        .scanning { box-shadow: 0 0 15px 2px #4ade80; z-index: 10; border-color: #fff; transform: scale(1.1); transition: transform 0.05s; }
        
        /* Custom Scrollbars */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #050505; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #166534; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #22c55e; }
        
        /* Form Elements */
        input[type="number"], input[type="range"], textarea {
            background-color: #050505; border-color: #166534; color: #4ade80; transition: border-color 0.2s;
        }
        input:focus, textarea:focus { outline: none; border-color: #4ade80; box-shadow: 0 0 8px rgba(74, 222, 128, 0.2); }
        input[type="range"] { accent-color: #22c55e; cursor: pointer; }
        ::-webkit-input-placeholder { color: #14532d; }
        
        /* Syntax Highlighting Classes for Python Code */
        .syn-keyword { color: #ff79c6; font-weight: bold; } /* pink */
        .syn-func { color: #50fa7b; } /* green */
        .syn-builtin { color: #8be9fd; font-style: italic; } /* cyan */
        .syn-string { color: #f1fa8c; } /* yellow */
        .syn-number { color: #bd93f9; } /* purple */
        .syn-comment { color: #6272a4; font-style: italic; } /* slate */
    </style>
</head>
<body class="h-screen w-screen flex flex-col overflow-hidden">
    <!-- Header -->
    <header class="border-b border-green-900 p-4 flex justify-between items-center bg-[#0a0a0a] shadow-md z-20">
        <div>
            <h1 class="text-xl font-bold text-green-500 tracking-tight">Autoregressive Mosaics</h1>
            <p class="text-[10px] text-green-800 uppercase tracking-widest mt-0.5">Neuro-Symbolic Compiler (Code-as-Policies)</p>
        </div>
        
        <div class="flex items-center gap-6">
            <!-- Hardware Telemetry -->
            <div class="flex flex-col text-right">
                <span class="text-[10px] text-green-700 uppercase tracking-wider">Target Hardware</span>
                <span class="text-xs font-bold text-green-500" id="gpu-name">Initializing...</span>
            </div>
            <div class="flex flex-col text-right border-l border-green-900 pl-4">
                <span class="text-[10px] text-green-700 uppercase tracking-wider">VRAM Allocation</span>
                <span class="text-xs font-mono text-green-400" id="gpu-vram">-- / -- GB</span>
            </div>
            <button id="save-btn" class="ml-2 bg-green-900 hover:bg-green-700 text-green-100 text-xs py-1.5 px-4 rounded border border-green-600 hidden transition-all shadow-[0_0_10px_rgba(22,101,52,0.4)]">
                [Export PNG]
            </button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <!-- Sidebar Controls -->
        <aside class="w-[400px] bg-[#0a0a0a] border-r border-green-900 p-6 flex flex-col gap-6 overflow-y-auto custom-scroll z-10">
            
            <!-- Dimensionality -->
            <div class="space-y-4">
                <div class="flex gap-4">
                    <div class="w-1/2">
                        <label class="block text-[10px] uppercase tracking-wider mb-1 text-green-700 font-bold">Columns ($N$)</label>
                        <input type="number" id="cols" value="24" min="4" max="128" class="w-full border rounded p-2 text-sm font-mono focus:ring-1 ring-green-500">
                    </div>
                    <div class="w-1/2">
                        <label class="block text-[10px] uppercase tracking-wider mb-1 text-green-700 font-bold">Rows ($M$)</label>
                        <input type="number" id="rows" value="24" min="4" max="128" class="w-full border rounded p-2 text-sm font-mono focus:ring-1 ring-green-500">
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label class="block text-[10px] uppercase tracking-wider text-green-700 font-bold">Stochasticity ($\tau$)</label>
                        <span id="temp-display" class="text-xs font-bold text-green-400 font-mono">0.4</span>
                    </div>
                    <input type="range" id="temp" min="0.0" max="1.0" step="0.1" value="0.4" class="w-full">
                </div>
            </div>

            <!-- Prompting -->
            <div class="space-y-3">
                <div>
                    <label class="block text-[10px] uppercase tracking-wider mb-1 text-green-700 font-bold">Semantic Objective ($c$)</label>
                    <textarea id="prompt" rows="3" class="w-full border rounded p-3 text-sm resize-none font-mono focus:ring-1 ring-green-500" placeholder="e.g., A red apple with a green leaf..."></textarea>
                </div>
                <button id="run-btn" class="w-full bg-[#0a2e16] hover:bg-[#14532d] text-green-400 font-bold py-3 px-4 rounded border border-green-700 transition-all shadow-[0_0_15px_rgba(20,83,45,0.6)] hover:shadow-[0_0_20px_rgba(34,197,94,0.4)] tracking-widest text-xs">
                    COMPILE TO CANVAS
                </button>
            </div>

            <!-- Compilation Telemetry -->
            <div class="mt-2 p-4 border border-green-900 bg-black rounded shadow-inner">
                <label class="block text-[10px] uppercase tracking-wider mb-2 text-green-700 font-bold border-b border-green-900 pb-1">Compilation Trace</label>
                <div id="status-log" class="text-[10px] font-mono text-green-600 whitespace-pre space-y-1">
                    <span class="opacity-50">System nominal. Awaiting instruction.</span>
                </div>
            </div>

            <!-- AST/Python Source Logic -->
            <div class="flex-1 min-h-[250px] flex flex-col mt-2">
                <label class="block text-[10px] uppercase tracking-wider mb-2 text-green-700 font-bold flex justify-between">
                    <span>Generated Raster Logic</span>
                    <span class="text-green-900">.py</span>
                </label>
                <div id="code-logs" class="custom-scroll flex-1 bg-[#050505] rounded border border-green-900 p-3 text-[11px] font-mono overflow-y-auto break-words text-green-400 whitespace-pre shadow-inner">
<span class="syn-comment"># AST will populate here upon compilation...</span>
                </div>
            </div>
        </aside>

        <!-- Canvas Area -->
        <section class="flex-1 bg-black flex items-center justify-center p-8 relative overflow-hidden bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-[#0a1a0f] to-black">
            <div id="grid-container" class="grid bg-[#050505] shadow-[0_0_40px_rgba(22,101,52,0.15)] border border-green-900/50 rounded-sm"></div>
            
            <div id="status-overlay" class="absolute bottom-6 right-6 bg-green-900/80 px-4 py-2 rounded border border-green-500 text-xs hidden text-green-100 backdrop-blur-md shadow-[0_0_20px_rgba(34,197,94,0.3)] font-mono">
                Rasterizing <span id="progress-indicator">0/0</span>
            </div>
        </section>
    </main>

    <script>
        const elements = {
            grid: document.getElementById('grid-container'),
            logs: document.getElementById('code-logs'),
            status: document.getElementById('status-log'),
            btn: document.getElementById('run-btn'),
            saveBtn: document.getElementById('save-btn'),
            rows: document.getElementById('rows'),
            cols: document.getElementById('cols'),
            temp: document.getElementById('temp'),
            tempDisplay: document.getElementById('temp-display'),
            prompt: document.getElementById('prompt'),
            overlay: document.getElementById('status-overlay'),
            progress: document.getElementById('progress-indicator'),
            gpuName: document.getElementById('gpu-name'),
            gpuVram: document.getElementById('gpu-vram')
        };

        // --- Telemetry Polling ---
        async function fetchGpuStats() {
            try {
                const res = await fetch('/gpu_stats');
                const stats = await res.json();
                elements.gpuName.innerText = stats.name;
                elements.gpuVram.innerText = `${stats.allocated_gb.toFixed(1)} / ${stats.total_gb.toFixed(1)} GB`;
            } catch (e) {
                console.warn("Telemetry offline.");
            }
        }
        setInterval(fetchGpuStats, 4000);
        fetchGpuStats();

        elements.temp.addEventListener('input', function() {
            elements.tempDisplay.textContent = this.value;
        });

        // --- Trace Logging ---
        function sysLog(msg, isError = false) {
            const ts = new Date().toISOString().split('T')[1].split('.')[0];
            const colorClass = isError ? 'text-red-500' : 'text-green-500';
            elements.status.innerHTML += `<div><span class="opacity-50 text-green-800">[${ts}]</span> <span class="${colorClass}">${msg}</span></div>`;
            elements.status.parentElement.scrollTop = elements.status.parentElement.scrollHeight;
        }

        // --- Lexical Syntax Highlighter ---
        function highlightPython(code) {
            let highlighted = code
                // Comments
                .replace(/(#.*)/g, '<span class="syn-comment">$1</span>')
                // Strings (Hex codes usually)
                .replace(/("[^"]*")/g, '<span class="syn-string">$1</span>')
                .replace(/('[^']*')/g, '<span class="syn-string">$1</span>')
                // Keywords
                .replace(/\b(def|for|in|if|elif|else|return|while|break|continue)\b/g, '<span class="syn-keyword">$1</span>')
                // Built-ins & Canvas object
                .replace(/\b(canvas)\./g, '<span class="syn-builtin">canvas</span>.')
                .replace(/\b(int|float|round|max|min|abs|range|len)\b/g, '<span class="syn-builtin">$1</span>')
                // Numbers
                .replace(/\b(\d+(\.\d+)?)\b/g, '<span class="syn-number">$1</span>');
            return highlighted;
        }

        // --- Canvas Initialization ---
        function initGrid() {
            elements.grid.innerHTML = '';
            const r = parseInt(elements.rows.value) || 24;
            const c = parseInt(elements.cols.value) || 24;
            
            elements.grid.style.gridTemplateColumns = `repeat(${c}, minmax(1px, 1fr))`;
            elements.grid.style.gridTemplateRows = `repeat(${r}, minmax(1px, 1fr))`;
            
            // Dynamic scaling ensures large grids don't break the viewport
            const maxPx = 650;
            const cellSize = Math.min(maxPx / Math.max(r, c), 40); 
            elements.grid.style.width = `${cellSize * c}px`;
            elements.grid.style.height = `${cellSize * r}px`;

            for (let i = 0; i < r; i++) {
                for (let j = 0; j < c; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell bg-[#050505]';
                    cell.id = `cell-${i}-${j}`;
                    elements.grid.appendChild(cell);
                }
            }
        }

        // --- Autoregressive Visualization ---
        async function animateRasterScan(hexMatrix, rows, cols) {
            elements.overlay.classList.remove('hidden');
            const total = rows * cols;
            // Optimization: Speed up animation for dense grids
            const delay = total > 1000 ? 1 : (total > 400 ? 5 : 15);
            
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    const cell = document.getElementById(`cell-${i}-${j}`);
                    if (!cell) continue;
                    
                    cell.classList.add('scanning');
                    cell.style.backgroundColor = hexMatrix[i][j] || '#000000';
                    elements.progress.innerText = `${(i * cols) + j + 1} / ${total}`;
                    
                    if (delay > 0) await new Promise(r => setTimeout(r, delay)); 
                    cell.classList.remove('scanning');
                }
            }
            elements.overlay.classList.add('hidden');
            sysLog(`Rasterization complete (${total} pixels).`);
        }

        // --- Execution Pipeline ---
        async function runGeneration() {
            elements.btn.disabled = true;
            elements.btn.classList.add('opacity-50', 'cursor-not-allowed');
            elements.saveBtn.classList.add('hidden');
            elements.status.innerHTML = '';
            elements.logs.innerHTML = '<span class="syn-comment"># Compiling spatial logic...</span>';

            const rows = parseInt(elements.rows.value) || 24;
            const cols = parseInt(elements.cols.value) || 24;
            const prompt = elements.prompt.value || "A glowing geometric shape";

            initGrid();
            sysLog(`Initiating Neuro-Symbolic Compiler.`);
            sysLog(`Matrix bounds: ${rows}x${cols}`);

            try {
                const response = await fetch('/generate_mosaic', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, rows, cols, temperature: parseFloat(elements.temp.value) })
                });
                
                if (!response.ok) throw new Error(`HTTP Error ${response.status}`);
                const data = await response.json();
                
                sysLog(`LLM Compilation successful.`);
                
                // Render stylized code
                elements.logs.innerHTML = highlightPython(data.code);
                
                // Animate the resulting matrix
                sysLog(`Injecting logic to DOM rasterizer...`);
                await animateRasterScan(data.matrix, rows, cols);
                
            } catch (error) {
                sysLog(`Pipeline Fault: ${error.message}`, true);
                elements.logs.innerHTML = `<span class="syn-comment text-red-500"># Execution Failed.\n# Check terminal for stack trace.</span>`;
            } finally {
                elements.btn.disabled = false;
                elements.btn.classList.remove('opacity-50', 'cursor-not-allowed');
                elements.saveBtn.classList.remove('hidden');
                fetchGpuStats();
            }
        }

        // --- Export ---
        function exportCanvasAsPNG() {
            const rows = parseInt(elements.rows.value);
            const cols = parseInt(elements.cols.value);
            const promptValue = elements.prompt.value || "untitled";
            const safePrompt = promptValue.replace(/[^a-z0-9]/gi, '-').toLowerCase().substring(0, 20);
            
            const canvas = document.createElement('canvas');
            const scale = (rows * cols > 2500) ? 10 : 30; // Scale down export for massive grids
            
            canvas.width = cols * scale;
            canvas.height = rows * scale;
            const ctx = canvas.getContext('2d');

            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    const cell = document.getElementById(`cell-${i}-${j}`);
                    ctx.fillStyle = cell.style.backgroundColor || '#050505';
                    ctx.fillRect(j * scale, i * scale, scale, scale);
                }
            }

            const link = document.createElement('a');
            link.download = `symbolic-${safePrompt}-${new Date().getTime()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            sysLog("Buffer exported to PNG.");
        }

        elements.btn.addEventListener('click', runGeneration);
        elements.saveBtn.addEventListener('click', exportCanvasAsPNG);
        
        // Initial setup
        initGrid();
    </script>
</body>
</html>
