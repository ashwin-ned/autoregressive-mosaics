<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hierarchical Mosaics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'JetBrains Mono', monospace; background-color: #050505; color: #22c55e; }
        .grid-cell { transition: background-color 0.1s ease-out; border: 1px solid #14532d; }
        .scanning { box-shadow: 0 0 15px 2px #4ade80; z-index: 10; border-color: #fff; transform: scale(1.1); transition: transform 0.1s; }
        .log-container::-webkit-scrollbar { width: 8px; }
        .log-container::-webkit-scrollbar-track { background: #050505; }
        .log-container::-webkit-scrollbar-thumb { background: #166534; border-radius: 4px; }
        input[type="number"], input[type="range"], textarea { background-color: #050505; border-color: #166534; color: #4ade80; }
        input:focus, textarea:focus { outline: none; border-color: #4ade80; box-shadow: 0 0 5px #166534; }
        input[type="range"] { accent-color: #22c55e; }
        ::-webkit-input-placeholder { color: #14532d; }
        .swatch { width: 14px; height: 14px; border: 1px solid #166534; display: inline-block; vertical-align: middle; border-radius: 2px;}
    </style>
</head>
<body class="h-screen w-screen flex flex-col overflow-hidden">
    <header class="border-b border-green-900 p-4 flex justify-between items-center bg-[#0a0a0a]">
        <div>
            <h1 class="text-xl font-bold text-green-500">Autoregressive Mosaics</h1>
            <p class="text-xs text-green-800">CVPR AI Art Gallery 2026</p>
        </div>
        <div class="flex gap-4">
            <button id="save-btn" class="bg-green-900 hover:bg-green-800 text-green-100 text-xs py-1 px-3 rounded border border-green-700 hidden transition-colors">
                [Export PNG]
            </button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <aside class="w-96 bg-[#0a0a0a] border-r border-green-900 p-6 flex flex-col gap-4 overflow-y-auto">
            <div class="space-y-3">
                <div class="flex gap-2">
                    <div class="w-1/2">
                        <label class="block text-xs mb-1 text-green-700">Cols (<strong>N</strong>)</label>
                        <input type="number" id="cols" value="16" min="4" max="32" class="w-full border rounded p-2 text-sm">
                    </div>
                    <div class="w-1/2">
                        <label class="block text-xs mb-1 text-green-700">Rows (<strong>M</strong>)</label>
                        <input type="number" id="rows" value="16" min="4" max="32" class="w-full border rounded p-2 text-sm">
                    </div>
                </div>
                <div>
                    <div class="flex items-center justify-between mb-1">
                        <label class="block text-xs text-green-700">Temperature (<strong>t</strong>)</label>
                        <span id="temp-display" class="text-xs text-green-400 font-bold font-mono">t = 0.3</span>
                    </div>
                    <input type="range" id="temp" min="0.0" max="1.0" step="0.1" value="0.3" class="w-full">
                </div>
            </div>

            <div class="space-y-3">
                <div>
                    <label class="block text-xs mb-1 text-green-700">Conditioning Prompt (<strong>c</strong>)</label>
                    <textarea id="prompt" rows="3" class="w-full border rounded p-2 text-sm resize-none" placeholder="e.g., A pixel art sword..."></textarea>
                </div>
                <button id="run-btn" class="w-full bg-green-800 hover:bg-green-700 text-green-100 font-bold py-2 px-4 rounded transition-colors shadow-[0_0_10px_rgba(22,101,52,0.5)]">
                    EXECUTE PIPELINE
                </button>
            </div>
            
            <div class="mt-2 p-3 border border-green-900 bg-black rounded">
                <label class="block text-xs mb-2 text-green-700 font-bold">Semantic Palette Mapping</label>
                <div id="palette-container" class="grid grid-cols-2 gap-2 text-[10px] text-green-600">
                    <span class="opacity-50">Awaiting generation...</span>
                </div>
            </div>

            <div class="flex-1 min-h-[150px] flex flex-col mt-2">
                <label class="block text-xs mb-1 text-green-700 font-bold">ASCII Topology Structure</label>
                <div id="logs" class="log-container flex-1 bg-black rounded border border-green-900 p-2 text-[10px] font-mono overflow-y-auto break-words text-green-400 whitespace-pre">
                    <span class="opacity-50">kernel initialized...</span>
                </div>
            </div>
        </aside>

        <section class="flex-1 bg-black flex items-center justify-center p-8 relative">
            <div id="grid-container" class="grid bg-[#050505] shadow-[0_0_30px_rgba(22,101,52,0.2)] border border-green-900"></div>
            <div id="status-overlay" class="absolute bottom-4 right-4 bg-green-900/80 px-4 py-2 rounded border border-green-800 text-xs hidden text-green-300 backdrop-blur-sm">
                Rendering <span id="progress-indicator">0/0</span>
            </div>
        </section>
    </main>

    <script>
        const elements = {
            grid: document.getElementById('grid-container'),
            logs: document.getElementById('logs'),
            btn: document.getElementById('run-btn'),
            saveBtn: document.getElementById('save-btn'),
            rows: document.getElementById('rows'),
            cols: document.getElementById('cols'),
            temp: document.getElementById('temp'),
            tempDisplay: document.getElementById('temp-display'),
            prompt: document.getElementById('prompt'),
            overlay: document.getElementById('status-overlay'),
            progress: document.getElementById('progress-indicator'),
            palette: document.getElementById('palette-container')
        };

        elements.temp.addEventListener('input', function() {
            elements.tempDisplay.textContent = `t = ${this.value}`;
        });

        function initGrid() {
            elements.grid.innerHTML = '';
            const r = parseInt(elements.rows.value), c = parseInt(elements.cols.value);
            elements.grid.style.gridTemplateColumns = `repeat(${c}, minmax(5px, 1fr))`;
            elements.grid.style.gridTemplateRows = `repeat(${r}, minmax(5px, 1fr))`;
            const cellSize = Math.min(650 / Math.max(r, c), 40); 
            elements.grid.style.width = `${cellSize * c}px`;
            elements.grid.style.height = `${cellSize * r}px`;

            for (let i = 0; i < r; i++) {
                for (let j = 0; j < c; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell bg-[#050505]';
                    cell.id = `cell-${i}-${j}`;
                    elements.grid.appendChild(cell);
                }
            }
        }

        function renderPalette(paletteDict) {
            elements.palette.innerHTML = '';
            for (const [char, hex] of Object.entries(paletteDict)) {
                elements.palette.innerHTML += `
                    <div class="flex items-center gap-2">
                        <div class="swatch" style="background-color: ${hex};"></div>
                        <span>'${char}' -> ${hex}</span>
                    </div>`;
            }
        }

        function displayAscii(asciiMatrix) {
            elements.logs.innerHTML = '';
            for (let i = 0; i < asciiMatrix.length; i++) {
                elements.logs.innerHTML += asciiMatrix[i].join(' ') + '\n';
            }
        }

        async function animateRasterScan(hexMatrix, rows, cols) {
            elements.overlay.classList.remove('hidden');
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    const cell = document.getElementById(`cell-${i}-${j}`);
                    if (!cell) continue;
                    
                    cell.classList.add('scanning');
                    cell.style.backgroundColor = hexMatrix[i][j];
                    elements.progress.innerText = `${(i * cols) + j + 1}/${rows * cols}`;
                    
                    // Simulate the satisfying autoregressive tick (15ms delay per pixel)
                    await new Promise(r => setTimeout(r, 15)); 
                    cell.classList.remove('scanning');
                }
            }
            elements.overlay.classList.add('hidden');
        }

        async function runGeneration() {
            elements.btn.disabled = true;
            elements.btn.classList.add('opacity-50', 'cursor-not-allowed');
            elements.saveBtn.classList.add('hidden');
            
            elements.logs.innerHTML = '<span class="opacity-50">Computing latent ASCII mask...</span>';
            elements.palette.innerHTML = '<span class="opacity-50">Mapping color vectors...</span>';

            const rows = parseInt(elements.rows.value);
            const cols = parseInt(elements.cols.value);
            const prompt = elements.prompt.value || "A smiley face";

            initGrid();

            try {
                // Single unified network call ensures global spatial awareness without Markovian breakdown
                const response = await fetch('/generate_mosaic', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        prompt: prompt,
                        rows: rows,
                        cols: cols,
                        temperature: parseFloat(elements.temp.value)
                    })
                });
                
                if (!response.ok) throw new Error(`HTTP Error ${response.status}`);
                const data = await response.json();
                
                renderPalette(data.palette);
                displayAscii(data.ascii_grid);
                
                // Animate the visual painting sequence locally
                await animateRasterScan(data.hex_matrix, rows, cols);
                
            } catch (error) {
                elements.logs.innerHTML = `<span class="text-red-500">Pipeline Fault: ${error.message}</span>`;
            } finally {
                elements.btn.disabled = false;
                elements.btn.classList.remove('opacity-50', 'cursor-not-allowed');
                elements.saveBtn.classList.remove('hidden');
            }
        }

        function exportCanvasAsPNG() {
            const rows = parseInt(elements.rows.value);
            const cols = parseInt(elements.cols.value);
            const canvas = document.createElement('canvas');
            const scale = 30; 
            
            canvas.width = cols * scale;
            canvas.height = rows * scale;
            const ctx = canvas.getContext('2d');

            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    const cell = document.getElementById(`cell-${i}-${j}`);
                    ctx.fillStyle = cell.style.backgroundColor || '#050505';
                    ctx.fillRect(j * scale, i * scale, scale, scale);
                }
            }

            const link = document.createElement('a');
            link.download = `hierarchical-mosaic-${new Date().getTime()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        elements.btn.addEventListener('click', runGeneration);
        elements.saveBtn.addEventListener('click', exportCanvasAsPNG);
        initGrid();
    </script>
</body>
</html>
